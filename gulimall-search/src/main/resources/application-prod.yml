server:
  port: 8080

spring:
  application:
    name: gulimall-search
  cloud:
    nacos:
      discovery:
        server-addr: nacos-service.gulimall:8848

    sentinel:
      transport:
        #配置sentinel dashboard地址
        dashboard: sentinel-service.gulimall:8333

  redis:
    host: redis-service.gulimall
    port: 6379
    password: 123456

#开启feign对sentinel的支持
feign:
  sentinel:
    enabled: true

  thymeleaf:
    cache: false

  session:
    store-type: redis

logging:
  level:
    com.xunqi.gulimall.search: debug
    root: warn
  pattern:
    console: "%d{yyyy-MM-dd} [%thread] - %msg%n"

#暴露所有端点
management:
  endpoints:
    web:
      exposure:
        include: '*'
