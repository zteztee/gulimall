server:
  port: 8080

  servlet:
    session:
      timeout: 30m

spring:
  application:
    name: gulimall-auth-server
  cloud:
    nacos:
      discovery:
        server-addr: nacos-service.gulimall:8848

    sentinel:
      transport:
        #配置sentinel dashboard地址
        dashboard: sentinel-service.gulimall:8333

  redis:
    host: redis-service.gulimall
    port: 6379
    password: 123456

  thymeleaf:
    cache: false

  session:
    store-type: redis
#开启feign对sentinel的支持
feign:
  sentinel:
    enabled: true


#暴露所有端点
management:
  endpoints:
    web:
      exposure:
        include: '*'



