server:
  port: 8080

spring:
  application:
    name: gulimall-order
  datasource:
    username: root
    password: root
    url: jdbc:mysql://mysql-service.gulimall:3306/gulimall_oms?useSSL=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.jdbc.Driver

  cloud:
    nacos:
      discovery:
        server-addr: nacos-service.gulimall:8848

    sentinel:
      transport:
        #配置sentinel dashboard地址
        dashboard: sentinel-service.gulimall:8333

  redis:
    host: redis-service.gulimall
    password: 123456
    port: 6379

#开启feign对sentinel的支持
feign:
  sentinel:
    enabled: true

  session:
    store-type: redis

mybatis-plus:
  # 不支持多包, 如有需要可在注解配置 或 提升扫包等级
  # 对应的 XML 文件位置
  mapper-locations: classpath:/mapper/**/*.xml
  # 启动时是否检查 MyBatis XML 文件的存在，默认不检查
  checkConfigLocation: false
  configLocation: classpath:mybatis/mybatis-config.xml

  #\u8BBE\u7F6E\u5B9E\u4F53\u7C7B\u7684\u81EA\u589E\u4E3B\u952E
  global-config:
    db-config:
      id-type: auto



#暴露所有端点
management:
  endpoints:
    web:
      exposure:
        include: '*'