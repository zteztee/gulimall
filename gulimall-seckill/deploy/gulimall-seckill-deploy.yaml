apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: gulimall-seckill
  name: gulimall-seckill
  namespace: gulimall
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  selector:
    matchLabels:
      app: gulimall-seckill
  template:
    metadata:
      labels:
        app: gulimall-seckill
    spec:
      containers:
        - name: gulimall-seckill
          image: $REGISTRY/$DOCKERHUB_NAMESPACE/$PROJECT_NAME:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 500Mi
            requests:
              cpu: 100m
              memory: 100Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst

---
kind: Service
apiVersion: v1
metadata:
  name: gulimall-seckill
  namespace: gulimall
  labels:
    app: gulimall-seckill
spec:
  ports:
    - protocol: TCP
      name: http
      port: 8080
      targetPort: 8080
      nodePort: 31007
  selector:
    app: gulimall-seckill
  type: NodePort
  sessionAffinity: None



